# HolyCore checked-ISA spec. Scoped to what the RTL actually decodes
# (src/control.sv): base RV32I + Zicsr (CSR opcode). No M, no C, no Zifencei.
# This is what RISCOF uses to PICK which arch-tests to run, so keep it honest -
# widening it makes RISCOF select tests the core can't execute (guaranteed
# fails); narrowing it silently skips coverage.
hart_ids: [0]
hart0:
  ISA: RV32IZicsr
  physical_addr_sz: 32
  User_Spec_Version: '2.3'
  supported_xlen: [32]
  misa:
    reset-val: 0x40000100          # MXL=1 (rv32) | I (bit 8)
    rv32:
      accessible: true
      mxl:
        implemented: true
        type:
          warl:
            dependency_fields: []
            legal:
              - mxl[1:0] in [0x1]
            wr_illegal:
              - Unchanged
      extensions:
        implemented: true
        type:
          warl:
            dependency_fields: []
            legal:
              - extensions[25:0] bitmask [0x0000100, 0x0000000]   # I only
            wr_illegal:
              - Unchanged
